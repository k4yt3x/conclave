name: Docs

on:
  push:
    branches:
      - master
    paths:
      - "docs/spec/**"
      - "docs/usage/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mdBook
        run: |
          version="$(curl https://api.github.com/repos/rust-lang/mdBook/releases/latest | jq -r '.tag_name')"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/$version/mdbook-$version-x86_64-unknown-linux-musl.tar.gz" | tar -xz
          sudo mv mdbook /usr/local/bin/

      - name: Install mdbook-mermaid
        run: |
          version="$(curl https://api.github.com/repos/badboy/mdbook-mermaid/releases/latest | jq -r '.tag_name')"
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/$version/mdbook-mermaid-$version-x86_64-unknown-linux-musl.tar.gz" | tar -xz
          sudo mv mdbook-mermaid /usr/local/bin/

      - name: Build User Guide
        run: mdbook build -d "$PWD/build/docs" docs/usage

      - name: Build Protocol Spec
        run: mdbook build -d "$PWD/build/docs/spec" docs/spec

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "build/docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
