syntax = "proto3";

package conclave.v1;

// ============================================================
// Authentication
// ============================================================

message RegisterRequest {
  string username = 1;
  string password = 2;
  string alias = 3;
}

message RegisterResponse {
  int64 user_id = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  int64 user_id = 2;
  string username = 3;
}

// ============================================================
// Key Packages
// ============================================================

message UploadKeyPackageRequest {
  bytes key_package_data = 1;
  repeated KeyPackageEntry entries = 2;
}

message KeyPackageEntry {
  bytes data = 1;
  bool is_last_resort = 2;
}

message UploadKeyPackageResponse {}

message GetKeyPackageResponse {
  bytes key_package_data = 1;
}

// ============================================================
// Groups
// ============================================================

message CreateGroupRequest {
  string alias = 1;
  // Field 2 removed (was member_usernames).
  string group_name = 3;
}

message CreateGroupResponse {
  int64 group_id = 1;
  // Field 2 removed (was member_key_packages).
}

message GroupInfo {
  int64 group_id = 1;
  string alias = 2;
  // Field 3 removed (was creator_id).
  repeated GroupMember members = 4;
  uint64 created_at = 5;
  string group_name = 6;
  string mls_group_id = 7;
  int64 message_expiry_seconds = 8;  // -1=disabled, 0=fetch-then-delete, >0=seconds
}

message GroupMember {
  int64 user_id = 1;
  string username = 2;
  string alias = 3;
  string role = 4;
}

message ListGroupsResponse {
  repeated GroupInfo groups = 1;
}

// ============================================================
// Commits (MLS group state changes)
// ============================================================

message UploadCommitRequest {
  bytes commit_message = 1;
  // Field 2 removed (was welcome_messages).
  // Group info for server-side ExternalClient observation
  bytes group_info = 3;
  // Hex-encoded MLS group ID (set on group creation commit)
  string mls_group_id = 4;
}

message UploadCommitResponse {}

// Pending welcome that a newly-invited member can fetch
message PendingWelcome {
  int64 group_id = 1;
  string group_alias = 2;
  bytes welcome_message = 3;
  int64 welcome_id = 4;
}

message ListPendingWelcomesResponse {
  repeated PendingWelcome welcomes = 1;
}

// ============================================================
// Invitations (post-creation member addition)
// ============================================================

message InviteToGroupRequest {
  repeated int64 user_ids = 1;
}

message InviteToGroupResponse {
  map<int64, bytes> member_key_packages = 1;
}

message EscrowInviteRequest {
  int64 invitee_id = 1;
  bytes commit_message = 2;
  bytes welcome_message = 3;
  bytes group_info = 4;
}

message EscrowInviteResponse {}

message PendingInvite {
  int64 invite_id = 1;
  int64 group_id = 2;
  string group_name = 3;
  string group_alias = 4;
  string inviter_username = 5;
  uint64 created_at = 6;
  int64 invitee_id = 7;
  int64 inviter_id = 8;
}

message ListPendingInvitesResponse {
  repeated PendingInvite invites = 1;
}

message AcceptInviteResponse {}

message DeclineInviteResponse {}

message ListGroupPendingInvitesResponse {
  repeated PendingInvite invites = 1;
}

message CancelInviteRequest {
  int64 invitee_id = 1;
}

message CancelInviteResponse {}

// ============================================================
// Admin Management
// ============================================================

message PromoteMemberRequest {
  int64 user_id = 1;
}

message PromoteMemberResponse {}

message DemoteMemberRequest {
  int64 user_id = 1;
}

message DemoteMemberResponse {}

message ListAdminsResponse {
  repeated GroupMember admins = 1;
}

// ============================================================
// Messages
// ============================================================

message SendMessageRequest {
  bytes mls_message = 1;
}

message SendMessageResponse {
  uint64 sequence_num = 1;
}

message StoredMessage {
  uint64 sequence_num = 1;
  int64 sender_id = 2;
  // Field 3 removed (was sender_username).
  bytes mls_message = 4;
  uint64 created_at = 5;
  // Field 6 removed (was sender_alias).
}

message GetMessagesResponse {
  repeated StoredMessage messages = 1;
}

// ============================================================
// Member Management
// ============================================================

message RemoveMemberRequest {
  int64 user_id = 1;
  bytes commit_message = 2;
  bytes group_info = 3;
}

message RemoveMemberResponse {}

message LeaveGroupRequest {
  bytes commit_message = 1;
  bytes group_info = 2;
}

message LeaveGroupResponse {}

// ============================================================
// External Commit (account reset / rejoin)
// ============================================================

message GetGroupInfoResponse {
  bytes group_info = 1;
}

message ResetAccountResponse {}

message ExternalJoinRequest {
  bytes commit_message = 1;
  // Hex-encoded MLS group ID (set on external rejoin)
  string mls_group_id = 2;
}

message ExternalJoinResponse {}

// ============================================================
// Profile Updates
// ============================================================

message UpdateProfileRequest {
  string alias = 1;
}

message UpdateProfileResponse {}

message UpdateGroupRequest {
  string alias = 1;
  string group_name = 2;
  int64 message_expiry_seconds = 3;
  bool update_message_expiry = 4;  // true when expiry field should be applied
}

message UpdateGroupResponse {}

message GetRetentionPolicyResponse {
  int64 server_retention_seconds = 1;  // -1=disabled, 0=fetch-then-delete, >0=seconds
  int64 group_expiry_seconds = 2;      // -1=disabled, 0=fetch-then-delete, >0=seconds
}

message ChangePasswordRequest {
  string new_password = 2;
}

message ChangePasswordResponse {}

// ============================================================
// SSE Events
// ============================================================

message ServerEvent {
  oneof event {
    NewMessageEvent new_message = 1;
    GroupUpdateEvent group_update = 2;
    WelcomeEvent welcome = 3;
    MemberRemovedEvent member_removed = 4;
    IdentityResetEvent identity_reset = 5;
    InviteReceivedEvent invite_received = 6;
    InviteDeclinedEvent invite_declined = 7;
    InviteCancelledEvent invite_cancelled = 8;
  }
}

message NewMessageEvent {
  int64 group_id = 1;
  uint64 sequence_num = 2;
  int64 sender_id = 3;
}

message GroupUpdateEvent {
  int64 group_id = 1;
  string update_type = 2;
}

message WelcomeEvent {
  int64 group_id = 1;
  string group_alias = 2;
}

message MemberRemovedEvent {
  int64 group_id = 1;
  int64 removed_user_id = 2;
}

message IdentityResetEvent {
  int64 group_id = 1;
  int64 user_id = 2;
}

message InviteReceivedEvent {
  int64 invite_id = 1;
  int64 group_id = 2;
  string group_name = 3;
  string group_alias = 4;
  int64 inviter_id = 5;
}

message InviteDeclinedEvent {
  int64 group_id = 1;
  int64 declined_user_id = 2;
}

message InviteCancelledEvent {
  int64 group_id = 1;
}

// ============================================================
// Common
// ============================================================

message ErrorResponse {
  string message = 1;
}

message UserInfoResponse {
  int64 user_id = 1;
  string username = 2;
  string alias = 3;
}
