[book]
title = "Conclave Protocol Specification"
description = "Protocol specification for Conclave, a self-hosted end-to-end encrypted group messaging system using MLS (RFC 9420)"
authors = ["Conclave Contributors"]
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
no-section-label = false
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.search]
enable = true
limit-results = 30

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
